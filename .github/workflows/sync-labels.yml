name: Sync Labels

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: EndBug/label-sync@v2
        with:
          config-file-path: labels.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}